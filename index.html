<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>게임 시작</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Malgun Gothic', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* 1. 시작 화면 */
  #startScreen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #fff;
    z-index: 30; cursor: pointer;
  }
  #startScreen h1 {
    font-size: clamp(28px, 6vw, 56px);
    margin-bottom: 30px;
  }
  #startScreen p {
    font-size: clamp(16px, 3vw, 22px);
    opacity: 0.8;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* 2. 영상 화면 */
  #videoWrap {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #000; z-index: 20;
  }
  #introVideo {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* 3. 버튼 화면 (button.png 표시) */
  #buttonScreen {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #fff8e7;
    z-index: 10;
    padding: 10px;
  }
  #buttonContainer {
    position: relative;
    max-width: 95vw;
    max-height: 95vh;
  }
  #buttonContainer img {
    display: block;
    max-width: 95vw;
    max-height: 95vh;
    width: auto; height: auto;
  }

  /* 클릭 영역 (위/아래 절반) */
  .clickArea {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    border-radius: 20px;
  }
  .clickArea.top    { top: 0; }
  .clickArea.bottom { bottom: 0; }

  /* 마우스/터치 시 살짝 빛나는 효과 */
  .clickArea:hover, .clickArea:active {
    background: rgba(255, 215, 0, 0.25);
    transform: scale(1.02);
  }
</style>
</head>
<body>

  <!-- 1. 시작 화면 -->
  <div id="startScreen" onclick="startIntro()">
    <h1>🎮 게임 시작 🎮</h1>
    <p>화면을 터치하세요</p>
  </div>

  <!-- 2. 영상 (controls 옵션으로 컨트롤바 표시) -->
  <div id="videoWrap">
    <video id="introVideo" playsinline preload="auto" controls controlslist="nodownload">
      <source src="intro.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 3. 버튼 화면 -->
  <div id="buttonScreen">
    <div id="buttonContainer">
      <img src="button.png" alt="게임 선택">
      <!-- 위쪽 절반: 산성비 게임 -->
      <div class="clickArea top" onclick="goGame('acid-rain.html')"></div>
      <!-- 아래쪽 절반: 손가락 게임 -->
      <div class="clickArea bottom" onclick="goGame('finger.html')"></div>
    </div>
  </div>

  <!-- 배경음악 -->
  <audio id="bgm" src="Turbo_Cartridge.mp3" loop></audio>

<script>
  const startScreen  = document.getElementById('startScreen');
  const videoWrap    = document.getElementById('videoWrap');
  const video        = document.getElementById('introVideo');
  const buttonScreen = document.getElementById('buttonScreen');
  const bgm          = document.getElementById('bgm');

  function startIntro() {
    startScreen.style.display = 'none';
    videoWrap.style.display = 'flex';
    video.play().catch(err => {
      console.log('영상 재생 실패:', err);
      showButtons();
    });
  }

  // 영상 끝나면 버튼 화면으로
  video.addEventListener('ended', showButtons);

  function showButtons() {
    videoWrap.style.display = 'none';
    buttonScreen.style.display = 'flex';
    bgm.volume = 0.5;
    bgm.play().catch(()=>{});
  }

  function goGame(url) {
    bgm.pause();
    window.location.href = url;
  }
</script>

</body>
</html>
