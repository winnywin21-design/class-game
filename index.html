<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>게임 시작</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Malgun Gothic', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* 1. 영상 화면 (첫 화면) */
  #videoWrap {
    position: fixed; inset: 0;
    display: flex;
    align-items: center; justify-content: center;
    background: #000; z-index: 20;
  }
  #introVideo {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* 큰 재생 버튼 오버레이 */
  #playOverlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.3);
    z-index: 25;
    transition: opacity 0.3s;
  }
  #playOverlay.hidden { opacity: 0; pointer-events: none; }

  .playButton {
    width: clamp(100px, 20vw, 160px);
    height: clamp(100px, 20vw, 160px);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.95);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
    animation: pulse 1.8s infinite;
  }
  .playButton::after {
    content: '';
    width: 0; height: 0;
    border-left: clamp(30px, 6vw, 50px) solid #1e3c72;
    border-top: clamp(20px, 4vw, 32px) solid transparent;
    border-bottom: clamp(20px, 4vw, 32px) solid transparent;
    margin-left: 12px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.5); }
    50%      { transform: scale(1.08); box-shadow: 0 0 60px rgba(255,255,255,0.8); }
  }
  #playOverlay p {
    color: #fff;
    font-size: clamp(18px, 3.5vw, 26px);
    margin-top: 25px;
    font-weight: bold;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  }

  /* 2. 버튼 화면 (button.png 표시) */
  #buttonScreen {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: #fff8e7;
    z-index: 10;
    padding: 10px;
  }
  #buttonContainer {
    position: relative;
    max-width: 95vw;
    max-height: 95vh;
  }
  #buttonContainer img {
    display: block;
    max-width: 95vw;
    max-height: 95vh;
    width: auto; height: auto;
  }

  /* 클릭 영역 (위/아래 절반) */
  .clickArea {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    border-radius: 20px;
  }
  .clickArea.top    { top: 0; }
  .clickArea.bottom { bottom: 0; }
  .clickArea:hover, .clickArea:active {
    background: rgba(255, 215, 0, 0.25);
    transform: scale(1.02);
  }
</style>
</head>
<body>

  <!-- 1. 영상 화면 (첫 화면) -->
  <div id="videoWrap">
    <video id="introVideo" playsinline preload="metadata" controls controlslist="nodownload">
      <source src="intro.mp4" type="video/mp4">
    </video>

    <!-- 큰 재생 버튼 오버레이 -->
    <div id="playOverlay" onclick="startVideo()">
      <div class="playButton"></div>
      <p>▶ 터치하여 시작</p>
    </div>
  </div>

  <!-- 2. 버튼 화면 -->
  <div id="buttonScreen">
    <div id="buttonContainer">
      <img src="button.png" alt="게임 선택">
      <div class="clickArea top"    onclick="goGame('acid-rain.html')"></div>
      <div class="clickArea bottom" onclick="goGame('finger.html')"></div>
    </div>
  </div>

  <!-- 배경음악 -->
  <audio id="bgm" src="Turbo_Cartridge.mp3" loop></audio>

<script>
  const videoWrap    = document.getElementById('videoWrap');
  const video        = document.getElementById('introVideo');
  const playOverlay  = document.getElementById('playOverlay');
  const buttonScreen = document.getElementById('buttonScreen');
  const bgm          = document.getElementById('bgm');

  function startVideo() {
    playOverlay.classList.add('hidden');
    video.play().catch(err => {
      console.log('영상 재생 실패:', err);
      showButtons();
    });
  }

  // 영상 끝나면 버튼 화면으로
  video.addEventListener('ended', showButtons);

  function showButtons() {
    videoWrap.style.display = 'none';
    buttonScreen.style.display = 'flex';
    bgm.volume = 0.5;
    bgm.play().catch(()=>{});
  }

  function goGame(url) {
    bgm.pause();
    window.location.href = url;
  }
</script>

</body>
</html>
